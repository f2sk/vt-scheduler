name: Update Stream Schedule

on:
  push:
    branches:
      - data
  workflow_dispatch:           # 手動実行

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Fetch data files from data branch
        run: |
          git fetch origin data:data 2>/dev/null || true
          for f in twitter.json youtube.json schedule.json; do
            if git show data:$f > actions/$f 2>/dev/null; then
              echo "$f loaded"
            else
              echo "$f not found, skipping"
            fi
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate HTML
        run: python actions/generate_html.py

      - name: Install Calendar dependencies
        run: pip install google-api-python-client google-auth

      - name: Update Google Calendar
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        run: python actions/update_calendar.py

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p dist
          cp actions/index.html dist/
          npx wrangler pages project create vt-scheduler --production-branch=main || true
          npx wrangler pages deploy dist/ --project-name=vt-scheduler --commit-dirty=true
